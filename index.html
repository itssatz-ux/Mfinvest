<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#111111"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="NAV Tracker"/>
<title>NAV Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');
  :root {
    --bg: #0e0e12; --card: #16161c; --border: #222230;
    --text: #e8e8f0; --muted: #666680; --up: #00c97a; --down: #ff4d6a;
    --accent: #7c6fff; --high-bg: #0a2618; --low-bg: #250a10;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); font-family: 'IBM Plex Sans', sans-serif; color: var(--text); overscroll-behavior: none; }

  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(14,14,18,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px; display: flex; justify-content: space-between; align-items: center;
  }
  .topbar-title { font-size: 15px; font-weight: 700; }
  .refresh-btn {
    background: var(--accent); color: #fff; border: none;
    border-radius: 7px; padding: 6px 13px; font-size: 12px;
    font-weight: 600; cursor: pointer;
  }
  .last-updated { font-size: 10px; color: var(--muted); margin-right: 10px; }

  .tabs-wrap { overflow-x: auto; padding: 12px 16px 0; }
  .tabs { display: flex; gap: 7px; min-width: max-content; padding-bottom: 12px; }
  .tab-btn {
    padding: 7px 14px; border: 1px solid var(--border); border-radius: 20px;
    background: var(--card); font-size: 12px; font-weight: 600;
    cursor: pointer; color: var(--muted);
  }
  .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .panel { display: none; padding: 14px 16px 32px; }
  .panel.active { display: block; }

  .summary-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px; margin-bottom: 16px;
  }
  .sc-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
  .sc-cat { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 14px; }
  .sc-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .sc-label { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
  .sc-val { font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 600; }
  .sc-stats-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }

  .up { color: var(--up); } .down { color: var(--down); }

  .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 10px 12px; text-align: left; font-size: 9px; color: var(--muted); text-transform: uppercase; background: #1a1a24; }
  th:not(:first-child) { text-align: right; }
  td { padding: 9px 12px; font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; border-bottom: 1px solid var(--border); }
  td:not(:first-child) { text-align: right; }
  .row-high { background: var(--high-bg); }
  .row-low  { background: var(--low-bg); }

  .badge { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 10px; font-weight: 600; }
  .badge-up   { background: rgba(0,201,122,0.15); color: var(--up); }
  .badge-down { background: rgba(255,77,106,0.15); color: var(--down); }
  .badge-neu  { background: rgba(255,255,255,0.06); color: var(--muted); }

  .hl-tag { display: inline-block; margin-left: 4px; padding: 1px 5px; border-radius: 3px; font-size: 9px; font-weight: 700; vertical-align: middle; color: #000; }
  .hl-high { background: var(--up); }
  .hl-low  { background: var(--down); color: #fff; }

  .loading-wrap { text-align: center; padding: 60px 20px; color: var(--muted); }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">📊 NAV Tracker</div>
  <div style="display:flex; align-items:center;">
    <div class="last-updated" id="lastUpdated">–</div>
    <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
  </div>
</div>

<div class="tabs-wrap"><div class="tabs" id="tabs"></div></div>
<div id="panels"></div>

<script>
const PROXY = (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;

const FUNDS = [
  { id:"bandhan",   name:"Bandhan Small Cap",          fullName:"Bandhan Small Cap Fund",              cat:"Small Cap · Direct Growth",                    code:"118390" },
  { id:"edelweiss", name:"Edelweiss G&S",               fullName:"Edelweiss Gold & Silver ETF FoF",       cat:"Gold & Silver FoF · Direct Growth",            code:"147715" },
  { id:"motilal",   name:"MO Midcap",                   fullName:"Motilal Oswal Midcap Fund",             cat:"Mid Cap · Direct Growth",                      code:"120503" },
  { id:"hdfc",      name:"HDFC Flexi",                  fullName:"HDFC Flexi Cap Fund",                   cat:"Flexi Cap · Direct Growth",                    code:"119533" },
  { id:"ppfas",     name:"PPFAS Flexi",                 fullName:"Parag Parikh Flexi Cap Fund",           cat:"Flexi Cap · Direct Growth",                    code:"122639" },
  { id:"icici",     name:"ICICI Value",                 fullName:"ICICI Pru Value Discovery Fund",        cat:"Value Fund · Direct Growth",                   code:"120505" },
];

// Initialize Tabs
const tabsEl = document.getElementById('tabs');
const panelsEl = document.getElementById('panels');
FUNDS.forEach((f, i) => {
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
  btn.textContent = f.name;
  btn.onclick = () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + f.id).classList.add('active');
  };
  tabsEl.appendChild(btn);

  const panel = document.createElement('div');
  panel.className = 'panel' + (i === 0 ? ' active' : '');
  panel.id = 'panel-' + f.id;
  panelsEl.appendChild(panel);
});

async function fetchFund(fund) {
  const url = `https://api.mfapi.in/mf/${fund.code}`;
  try {
    const r = await fetch(PROXY(url));
    return await r.json();
  } catch (e) { throw e; }
}

function renderFund(fund, json) {
  // API returns Newest -> Oldest. We take the last 30 days.
  const data = (json.data || []).slice(0, 30).map(d => ({ date: d.date, nav: parseFloat(d.nav) }));
  if (!data.length) return "No data found";

  const latestNav = data[0].nav;
  const oldestNav = data[data.length - 1].nav;
  const navValues = data.map(d => d.nav);
  const maxNav = Math.max(...navValues);
  const minNav = Math.min(...navValues);

  const totalChange = latestNav - oldestNav;
  const totalPct = ((totalChange / oldestNav) * 100).toFixed(2);
  const isUp = totalChange >= 0;

  function fmtDate(str) {
    const [d, m, y] = str.split('-');
    const mos = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${d} ${mos[parseInt(m)-1]} ${y.slice(2)}`;
  }

  let html = `<div class="summary-card">
    <div class="sc-name">${fund.fullName}</div>
    <div class="sc-cat">${fund.cat}</div>
    <div class="sc-stats">
      <div class="sc-stat"><div class="sc-label">Latest NAV</div><div class="sc-val">₹${latestNav.toFixed(4)}</div></div>
      <div class="sc-stat"><div class="sc-label">30D Return</div><div class="sc-val ${isUp?'up':'down'}">${isUp?'+':''}${totalPct}%</div></div>
      <div class="sc-stat"><div class="sc-label">Change ₹</div><div class="sc-val ${isUp?'up':'down'}">${isUp?'+':''}₹${Math.abs(totalChange).toFixed(2)}</div></div>
    </div>
    <div class="sc-stats-2">
      <div class="sc-stat"><div class="sc-label">Period High</div><div class="sc-val up">₹${maxNav.toFixed(4)}</div></div>
      <div class="sc-stat"><div class="sc-label">Period Low</div><div class="sc-val down">₹${minNav.toFixed(4)}</div></div>
    </div>
  </div>`;

  let rows = '';
  data.forEach((row, i) => {
    const prev = data[i + 1]; // Because data is newest first, i+1 is the previous day
    const dc = prev ? row.nav - prev.nav : null;
    const dp = prev ? (dc / prev.nav * 100) : null;
    const vsStart = ((row.nav - oldestNav) / oldestNav * 100);

    let badge = `<span class="badge badge-neu">—</span>`;
    if (dc !== null) {
      if (dp > 0.001) badge = `<span class="badge badge-up">▲ ${dp.toFixed(2)}%</span>`;
      else if (dp < -0.001) badge = `<span class="badge badge-down">▼ ${Math.abs(dp).toFixed(2)}%</span>`;
      else badge = `<span class="badge badge-neu">0.00%</span>`;
    }

    const hl = row.nav === maxNav ? `<span class="hl-tag hl-high">HIGH</span>` : row.nav === minNav ? `<span class="hl-tag hl-low">LOW</span>` : '';
    const rowClass = row.nav === maxNav ? 'row-high' : row.nav === minNav ? 'row-low' : '';

    rows += `<tr class="${rowClass}">
      <td>${fmtDate(row.date)}</td>
      <td style="font-weight:600">₹${row.nav.toFixed(4)}${hl}</td>
      <td class="${dc >= 0 ? 'up' : 'down'}">${dc ? (dc > 0 ? '+' : '') + dc.toFixed(4) : '—'}</td>
      <td>${badge}</td>
      <td class="${vsStart >= 0 ? 'up' : 'down'}">${vsStart >= 0 ? '+' : ''}${vsStart.toFixed(2)}%</td>
    </tr>`;
  });

  return html + `<div class="table-wrap"><table><thead><tr><th>Date</th><th>NAV</th><th>Change</th><th>Daily %</th><th>vs Start</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

async function loadAll() {
  document.getElementById('lastUpdated').textContent = 'Updating...';
  for (const fund of FUNDS) {
    const panel = document.getElementById('panel-' + fund.id);
    panel.innerHTML = `<div class="loading-wrap"><div class="spinner"></div>Loading ${fund.name}...</div>`;
    try {
      const json = await fetchFund(fund);
      panel.innerHTML = renderFund(fund, json);
    } catch (e) {
      panel.innerHTML = `<div style="color:var(--down); padding:20px;">Error loading ${fund.name}</div>`;
    }
  }
  document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
}

loadAll();
</script>
</body>
</html>
